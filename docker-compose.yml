version: "3.8"

services:
  api:
    build: .
    container_name: muhyak-ai
    env_file: .env
    depends_on:
      - db
      - redis
    ports:
      - "127.0.0.1:3322:8000"
    deploy:
      resources:
        limits:
          memory: 2G

  # Scale workers horizontally: docker-compose up --scale rq-worker=4
  rq-worker:
    build: .
    command: python worker.py
    env_file: .env
    depends_on:
      - api
      - redis
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  rq-dashboard:
    build: .
    container_name: muhyak-rq-dashboard
    command: rq-dashboard --redis-url redis://redis:6379 --port 9181
    ports:
      - "9181:9181"
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    image: redis:7
    container_name: muhyak-redis
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M

  db:
    image: pgvector/pgvector:pg15
    container_name: photos-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  pg_data:
  redis_data:
